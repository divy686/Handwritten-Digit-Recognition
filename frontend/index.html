<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handwritten Digit Recognition</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
        body{

         background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4ZPkQuKjeDGpdMxDVSbUoKu494kMq-5ZdbA&s') no-repeat center center/cover;


      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-align: center;
      padding-top: 40px;
      backdrop-filter: blur(3px);
    }

    .container-box {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
      width: 90%;
      max-width: 650px;
      margin: auto;
    }

    h1 {
      font-weight: 600;
      text-shadow: 0 0 10px #00eaff;
      margin-bottom: 20px;
    }

    canvas {
      background: #fff;
      border-radius: 10px;
      border: 3px solid #00eaff;
      cursor: crosshair;
    }

    button {
      margin: 10px;
      border-radius: 10px;
      padding: 10px 20px;
      border: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn-primary {
      background: #00eaff;
      color: #000;
    }

    .btn-danger {
      background: #ff4757;
    }

    .btn-success {
      background: #2ed573;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result-box {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 15px;
      margin-top: 15px;
    }

    #history {
      text-align: left;
      font-size: 0.95em;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 10px;
    }

    #file-input {
      display: none;
    }

    label[for="file-input"] {
      background: #ffa502;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      color: #000;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container-box">
    <h1>🧠 Handwritten Digit Recognition</h1>
    <canvas id="canvas" width="280" height="280"></canvas>
    <div>
      <button class="btn-primary" onclick="predictDigit()">Predict</button>
      <button class="btn-danger" onclick="clearCanvas()">Clear</button>
      <button class="btn-success" onclick="clearHistory()">Clear History</button>
      <label for="file-input">Upload Image</label>
      <input type="file" id="file-input" accept="image/*" onchange="uploadImage(event)">
    </div>

    <div id="result-box">
      <h4>Prediction Result</h4>
      <p id="result">Draw a digit and click Predict!</p>
      <div id="history"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mousemove', draw);

    function draw(event) {
      if (!drawing) return;
      ctx.lineWidth = 15;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'black';
      const rect = canvas.getBoundingClientRect();
      ctx.lineTo(event.clientX - rect.left, event.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(event.clientX - rect.left, event.clientY - rect.top);
    }

    function clearCanvas() {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
    }

    clearCanvas(); // make background white initially

    async function predictDigit() {
      const dataURL = canvas.toDataURL('image/png');
      const response = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: dataURL })
      });
      const result = await response.json();
      document.getElementById('result').innerHTML = 
        `<b>Digit:</b> ${result.digit} <br> 
         <b>Confidence:</b> ${result.confidence} <br>
         <b>Status:</b> ${result.message}`;
      updateHistory(result.history);
    }

    async function uploadImage(event) {
      const file = event.target.files[0];
      const formData = new FormData();
      formData.append('file', file);
      const response = await fetch('/predict', { method: 'POST', body: formData });
      const result = await response.json();
      document.getElementById('result').innerHTML =
        `<b>Digit:</b> ${result.digit} <br> 
         <b>Confidence:</b> ${result.confidence} <br>
         <b>Status:</b> ${result.message}`;
      updateHistory(result.history);
    }

    function updateHistory(history) {
      const historyDiv = document.getElementById('history');
      historyDiv.innerHTML = "<b>Prediction History:</b><br>";
      history.slice().reverse().forEach((h) => {
        historyDiv.innerHTML += 
          `Digit: ${h.digit} | Confidence: ${h.confidence} | Time: ${h.time}<br>`;
      });
    }

    async function clearHistory() {
      await fetch('/clear_history', { method: 'POST' });
      document.getElementById('history').innerHTML = "";
      document.getElementById('result').innerText = "History cleared!";
    }
  </script>
</body>
</html>
